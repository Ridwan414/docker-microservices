# Production compose file — zero-config.
#
# Every application service pulls its image from Docker Hub under
# <DOCKERHUB_USERNAME>/docker-microservices-<service>:latest (pushed by
# the CI pipeline). Infrastructure (postgres, mongo) uses the official
# upstream images.
#
# No .env file, no exported variables, no build step on the host.
# Share this single file and run:
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Stop:
#   docker compose -f docker-compose.prod.yml down         # keep volumes
#   docker compose -f docker-compose.prod.yml down -v      # wipe data

services:
  user-service:
    image: asifmahmoud414/docker-microservices-user-service:v0.0.14
    pull_policy: always
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_prod_pass@postgres:5432/user_db
      - SECRET_KEY=hardcoded-prod-secret-key-change-by-editing-this-file
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    image: asifmahmoud414/docker-microservices-product-service:v0.0.14
    pull_policy: always
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=product_db
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
    depends_on:
      mongo:
        condition: service_healthy
      inventory-service:
        condition: service_started
    restart: unless-stopped

  inventory-service:
    image: asifmahmoud414/docker-microservices-inventory-service:v0.0.14
    pull_policy: always
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_prod_pass@postgres:5432/inventory_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    image: asifmahmoud414/docker-microservices-order-service:v0.0.14
    pull_policy: always
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=order_db
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      inventory-service:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_prod_pass
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/init.sh
        mode: 0755
    # Postgres first start also runs the inlined init script which creates
    # two databases; give it a 20s start_period before healthchecks count.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    # MongoDB first start can take 30-60s (WiredTiger init, index build,
    # Windows/WSL2 adds more). 30s start_period gives it a free pass before
    # healthchecks start counting; 10 retries × 10s = ~100s tail grace.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: asifmahmoud414/docker-microservices-frontend:v0.0.14
    pull_policy: always
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-service
      - inventory-service
      - order-service
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:

# Inlined postgres init script (creates user_db + inventory_db on first
# start). Mounted into the container as /docker-entrypoint-initdb.d/init.sh
# via the `configs:` block above so this compose file is fully self-contained.
configs:
  postgres_init:
    content: |
      #!/bin/bash
      set -e

      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" <<-EOSQL
          CREATE DATABASE user_db;
          CREATE DATABASE inventory_db;
      EOSQL
