version: '3.8'

services:
  # User Service
  user-service:
    build: ./user-service
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/user_db
      - SECRET_KEY=your-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      postgres:
        condition: service_healthy

  # Product Service
  product-service:
    build: ./product-service
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=product_db
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
    depends_on:
      mongo:
        condition: service_healthy
      inventory-service:
        condition: service_started

  # Inventory Service
  inventory-service:
    build: ./inventory-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/inventory_db
    depends_on:
      postgres:
        condition: service_healthy

  # Order Service
  order-service:
    build: ./order-service
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=order_db
      - USER_SERVICE_URL=http://user-service:8000
      - PRODUCT_SERVICE_URL=http://product-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
    depends_on:
      mongo:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      inventory-service:
        condition: service_started

  # PostgreSQL (shared by user and inventory services)
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB (for product and order services)
  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # React SPA. Nginx inside the container serves the static bundle and
  # reverse-proxies /api/<service>/... to the matching FastAPI container.
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - product-service
      - inventory-service
      - order-service
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
