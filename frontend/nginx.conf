# Nginx config for the SPA, bundled in the frontend container.
#
# Browser hits the frontend on port 80 (published on the host as 3000).
# Static assets are served from /usr/share/nginx/html. Any request beginning
# with /api/ is reverse-proxied to the matching FastAPI service on the
# internal Docker network, using the in-container ports declared in
# docker-compose.yml:
#
#   user-service:8000, product-service:8001, inventory-service:8002,
#   order-service:8003
#
# Order matters: the more specific /api/v1/auth and /api/v1/users prefixes
# must come before the catch-all /api/ block.

upstream user_service      { server user-service:8000; }
upstream product_service   { server product-service:8001; }
upstream inventory_service { server inventory-service:8002; }
upstream order_service     { server order-service:8003; }

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Larger bodies in case product images/etc. are added later
    client_max_body_size 10m;

    # Generic proxy headers for all routes
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Auth + user routes -> user-service
    location /api/v1/auth/   { proxy_pass http://user_service; }
    location /api/v1/users/  { proxy_pass http://user_service; }

    # Catalog -> product-service
    location /api/v1/products/   { proxy_pass http://product_service; }

    # Stock -> inventory-service
    location /api/v1/inventory/  { proxy_pass http://inventory_service; }

    # Cart + orders -> order-service
    location /api/v1/orders/     { proxy_pass http://order_service; }

    # Health endpoint for compose
    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: any non-asset, non-api request gets index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}