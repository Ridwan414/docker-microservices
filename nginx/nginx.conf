# Host-level nginx configuration for terminating TLS in front of the
# frontend container.
#
# Architecture:
#
#   Browser  ──https://18.142.228.5──▶  host nginx:443 (this file, TLS)
#                                          │
#                                          │  http://127.0.0.1:3000
#                                          ▼
#                                    frontend container:80
#                                          │
#                                          │  /api/v1/* routed by the
#                                          │  container's own nginx.conf
#                                          ▼
#                                    FastAPI services (user / product /
#                                    inventory / order) on the docker network
#
# Path-based routing keeps everything on a single hostname. The frontend
# container already proxies /api/v1/auth, /api/v1/users, /api/v1/products,
# /api/v1/inventory, and /api/v1/orders to the right FastAPI service
# (see frontend/nginx.conf inside the frontend image).
#
# Cert is self-signed — browsers will warn the first time. Run
# `scripts/setup-https.sh` on the VM to generate and install it.

# Redirect plain HTTP to HTTPS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server. Frontend container listens on host port 3000 (mapped from
# container port 80 — see docker-compose.prod.yml).
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name 18.142.228.5;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend container (publishes 3000:80).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}